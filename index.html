<!doctype html>
<html lang="en">

<head>

  <!-- Basic -->
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    http-equiv="X-UA-Compatible"
    content="IE=edge"
  />

  <!-- Primary SEO -->
  <title>
    Dubai Real Estate Brokerage & Property Portal | HOMOGET
  </title>

  <meta
    name="title"
    content="Dubai Real Estate Brokerage & Property Portal | HOMOGET"
  />

  <meta
    name="description"
    content="HOMOGET is a Dubai real estate brokerage and property portal where verified agents list luxury villas, apartments, off-plan projects, and commercial properties across Dubai."
  />

  <meta
    name="keywords"
    content="
    Dubai real estate,
    Dubai property portal,
    Dubai real estate brokerage,
    property listings Dubai,
    real estate agents Dubai,
    luxury villas Dubai,
    apartments for sale Dubai,
    off-plan properties Dubai,
    Dubai investment properties,
    commercial properties Dubai,
    UAE real estate,
    Dubai property consultants,
    buy property in Dubai,
    Dubai homes,
    Dubai property marketplace
    "
  />

  <meta
    name="author"
    content="HOMOGET"
  />

  <meta
    name="robots"
    content="index, follow, max-image-preview:large"
  />

  <meta
    name="googlebot"
    content="index, follow"
  />

  <!-- Canonical -->
  <link
    rel="canonical"
    href="https://homoget.ae/"
  />

  <!-- Language -->
  <meta
    http-equiv="content-language"
    content="en"
  />

  <!-- Theme -->
  <meta
    name="theme-color"
    content="#ffffff"
  />

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/png"
    href="/companylogo.png"
  />

  <link
    rel="apple-touch-icon"
    href="/companylogo.png"
  />

  <!-- Open Graph SEO -->
  <meta
    property="og:type"
    content="website"
  />

  <meta
    property="og:site_name"
    content="HOMOGET"
  />

  <meta
    property="og:title"
    content="Dubai Real Estate Brokerage & Property Portal | HOMOGET"
  />

  <meta
    property="og:description"
    content="Browse Dubai property listings from verified real estate agents. Find villas, apartments, off-plan projects, and commercial properties across Dubai."
  />

  <meta
    property="og:url"
    content="https://homoget.ae/"
  />

  <meta
    property="og:image"
    content="https://homoget.ae/og-banner.jpg"
  />

  <meta
    property="og:image:width"
    content="1200"
  />

  <meta
    property="og:image:height"
    content="630"
  />

  <meta
    property="og:locale"
    content="en_US"
  />

  <!-- Twitter SEO -->
  <meta
    name="twitter:card"
    content="summary_large_image"
  />

  <meta
    name="twitter:title"
    content="Dubai Real Estate Brokerage & Property Portal | HOMOGET"
  />

  <meta
    name="twitter:description"
    content="Find luxury villas, apartments, off-plan projects, and commercial properties in Dubai with HOMOGET."
  />

  <meta
    name="twitter:image"
    content="https://homoget.ae/og-banner.jpg"
  />

  <!-- Preconnect -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Remix Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
    rel="stylesheet"
  />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
  />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "RealEstateAgent",

    "name": "HOMOGET",

    "url": "https://homoget.ae",

    "logo": "https://homoget.ae/companylogo.png",

    "image": "https://homoget.ae/og-banner.jpg",

    "description": "Dubai real estate brokerage and property portal with verified real estate agents, luxury villas, apartments, off-plan projects, and commercial properties.",

    "telephone": "+971-585919585",

    "priceRange": "$$$",

    "areaServed": {
      "@type": "City",
      "name": "Dubai"
    },

    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Dubai",
      "addressCountry": "AE"
    },

    "sameAs": [
      "https://www.facebook.com/",
      "https://www.instagram.com/",
      "https://www.linkedin.com/"
    ]
  }
  </script>

  <!-- Website Schema -->
  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"WebSite",

    "name":"HOMOGET",

    "url":"https://homoget.ae",

    "potentialAction":{
      "@type":"SearchAction",
      "target":"https://homoget.ae/search?q={search_term_string}",
      "query-input":"required name=search_term_string"
    }
  }
  </script>

  <!-- Organization Schema -->
  <script type="application/ld+json">
  {
    "@context":"https://schema.org",

    "@type":"Organization",

    "name":"HOMOGET",

    "url":"https://homoget.ae",

    "logo":"https://homoget.ae/companylogo.png",

    "sameAs":[
      "https://www.facebook.com/",
      "https://www.instagram.com/",
      "https://www.linkedin.com/"
    ]
  }
  </script>

  <!-- Google Analytics -->
  <!-- Replace G-XXXXXXXXXX with your actual GA4 ID -->

  <script
    async
    src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"
  ></script>

  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());

    gtag('config', 'G-XXXXXXXXXX');
  </script>

</head>

  <!-- React Root -->
  <div id="root"></div>

  <script
    type="module"
    src="/src/main.jsx"
  ></script>

</body>

</html>
